<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auftrags-Manager Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f4f4f4; }
        #sidebar { width: 350px; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100%; }
        input, textarea, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Auftrags-Details</h3>
    <input type="text" id="kunde" placeholder="Firma">
    <input type="text" id="ort" placeholder="Ort">
    <input type="date" id="datum">
    <textarea id="info" rows="4" placeholder="Notizen"></textarea>
    <input type="color" id="farbe" value="#e67e22">
    <button onclick="addAuftrag()">Speichern</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRXOG6JPGt5YWQ68HQ1zBKntSn6ohLDwUKPZPAnmE0P71v_uIzGEagT4x7po0LFgEfA/exec";
    
    const map = L.map('map').setView([50.627, 12.096], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let tempMarker;
    map.on('click', (e) => {
        if (tempMarker) map.removeLayer(tempMarker);
        tempMarker = L.marker(e.latlng).addTo(map);
        tempMarker.lat = e.latlng.lat;
        tempMarker.lng = e.latlng.lng;
    });

    async function addAuftrag() {
        if (!tempMarker) return alert("Bitte erst einen Ort auf der Karte anklicken!");
        
        const daten = {
            kunde: document.getElementById('kunde').value,
            ort: document.getElementById('ort').value,
            datum: document.getElementById('datum').value,
            info: document.getElementById('info').value,
            farbe: document.getElementById('farbe').value,
            lat: tempMarker.lat,
            lon: tempMarker.lng
        };

        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(daten)
        });

        alert("Auftrag in der Cloud gespeichert!");
        location.reload();
    }

    async function ladeDaten() {
        const response = await fetch(SCRIPT_URL);
        const daten = await response.json();
        
        daten.forEach(d => {
            // Umwandlung sicherstellen (Punkt statt Komma)
            const lat = parseFloat(String(d.lat).replace(',', '.'));
            const lon = parseFloat(String(d.lon).replace(',', '.'));
            
            if (!isNaN(lat) && !isNaN(lon)) {
                L.circleMarker([lat, lon], { color: d.farbe, radius: 8 })
                 .addTo(map)
                 .bindPopup(`<b>${d.kunde}</b><br>${d.ort}<br>${d.info}`);
            }
        });
    }

    window.onload = ladeDaten;
</script>
</body>
</html>
