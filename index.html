<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auftrags-Manager Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: #f4f4f4; }
        #sidebar { width: 350px; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; height: 100%; }
        input, textarea, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        input, textarea { background: #34495e; color: white; }
        button { background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
        .popup-card button { margin-top: 5px; display: block; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Auftrags-Details</h3>
    <input type="text" id="kunde" placeholder="Firma">
    <input type="text" id="ort" placeholder="Ort">
    <input type="date" id="startDatum">
    <textarea id="info" rows="4" placeholder="Notizen"></textarea>
    <input type="color" id="farbe" value="#e67e22">
    <button onclick="addAuftrag()">Speichern</button>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([50.655, 12.191], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let auftraege = JSON.parse(localStorage.getItem('auftraege')) || [];

    function drawPoint(a, index) {
        const popupContent = document.createElement('div');
        popupContent.className = "popup-card";
        popupContent.innerHTML = `<b>${a.kunde}</b><br>${a.start}<br>${a.info}<br>`;
        
        const btnEdit = document.createElement('button');
        btnEdit.innerText = "Bearbeiten";
        btnEdit.style.background = "#3498db";
        btnEdit.onclick = () => {
            document.getElementById('kunde').value = a.kunde;
            document.getElementById('ort').value = a.ort;
            document.getElementById('info').value = a.info;
            alert("Daten geladen! Bitte nach Änderung neu speichern.");
        };

        const btnDelete = document.createElement('button');
        btnDelete.innerText = "Löschen";
        btnDelete.style.background = "#e74c3c";
        btnDelete.onclick = () => {
            auftraege.splice(index, 1);
            localStorage.setItem('auftraege', JSON.stringify(auftraege));
            location.reload();
        };

        popupContent.appendChild(btnEdit);
        popupContent.appendChild(btnDelete);
        L.circleMarker([a.lat, a.lon], { color: a.farbe, radius: 12 }).addTo(map).bindPopup(popupContent);
    }

    auftraege.forEach((a, i) => drawPoint(a, i));

    async function addAuftrag() {
        const ort = document.getElementById('ort').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(ort)}`);
        const data = await res.json();
        if (data.length > 0) {
            const neuer = { lat: data[0].lat, lon: data[0].lon, kunde: document.getElementById('kunde').value, ort: ort, info: document.getElementById('info').value, start: document.getElementById('startDatum').value, farbe: document.getElementById('farbe').value };
            auftraege.push(neuer);
            localStorage.setItem('auftraege', JSON.stringify(auftraege));
            location.reload();
        } else { alert("Ort nicht gefunden!"); }
    }
</script>
</body>
</html>
