<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktive Karte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <div id="sidebar">
            <h2>📍 Map Control</h2>
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="firma" placeholder="Firma">
            <input type="text" id="strasse" placeholder="Straße">
            <input type="text" id="ort" placeholder="Ort">
            <input type="date" id="datum">
            <textarea id="notiz" placeholder="Notiz..."></textarea>
            <input type="color" id="farbe" value="#ff0000">
            <button id="save-btn" onclick="saveLocation()">Speichern</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
